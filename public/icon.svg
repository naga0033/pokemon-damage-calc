<svg width="1024" height="1024" viewBox="190 175 644 644" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- グラデーション定義 -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE88A"/>
      <stop offset="40%" stop-color="#D4A017"/>
      <stop offset="70%" stop-color="#C8961E"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF5C0"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#4A1A6B"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="ballTop" x1="512" y1="290" x2="512" y2="497" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#6C3483"/>
    </linearGradient>
    <linearGradient id="ballBottom" x1="512" y1="503" x2="512" y2="710" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </linearGradient>
    <linearGradient id="crownGrad" x1="512" y1="240" x2="512" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF5C0"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- 背景の微妙な放射グラデーション -->
  <circle cx="512" cy="497" r="400" fill="#D4A017" fill-opacity="0.06"/>

  <!-- 下部V字（紫翼） -->
  <path d="M512 920 L180 480 L280 420 L512 720 L744 420 L844 480 Z" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <path d="M512 860 L230 490 L290 450 L512 690 L734 450 L794 490 Z" fill="none" stroke="#BB7FD6" stroke-width="2" stroke-opacity="0.4"/>

  <!-- 黒い下部アクセント -->
  <path d="M512 920 L320 560 L380 520 L512 740 L644 520 L704 560 Z" fill="url(#darkGrad)" fill-opacity="0.7"/>

  <!-- 金のV字翼（左） -->
  <path d="M100 440 L240 340 L420 460 L360 500 L240 420 L140 490 Z" fill="url(#goldShine)" filter="url(#shadow)"/>
  <path d="M120 450 L240 360 L400 465 L360 490 L240 400 L155 460 Z" fill="none" stroke="#FFF5C0" stroke-width="2" stroke-opacity="0.5"/>

  <!-- 金のV字翼（右） -->
  <path d="M924 440 L784 340 L604 460 L664 500 L784 420 L884 490 Z" fill="url(#goldShine)" filter="url(#shadow)"/>
  <path d="M904 450 L784 360 L624 465 L664 490 L784 400 L869 460 Z" fill="none" stroke="#FFF5C0" stroke-width="2" stroke-opacity="0.5"/>

  <!-- 追加の金翼パーツ（外側） -->
  <path d="M60 420 L180 300 L260 360 L160 440 Z" fill="url(#goldGrad)" filter="url(#shadow)"/>
  <path d="M964 420 L844 300 L764 360 L864 440 Z" fill="url(#goldGrad)" filter="url(#shadow)"/>

  <!-- マスターボール外枠（金リング） - 大きく -->
  <circle cx="512" cy="497" r="210" fill="url(#goldGrad)" filter="url(#shadow)"/>
  <circle cx="512" cy="497" r="193" fill="#222"/>

  <!-- マスターボール上半分（紫） -->
  <clipPath id="topHalf">
    <rect x="312" y="290" width="400" height="207"/>
  </clipPath>
  <circle cx="512" cy="497" r="188" fill="url(#ballTop)" clip-path="url(#topHalf)"/>

  <!-- マスターボール下半分（白） -->
  <clipPath id="bottomHalf">
    <rect x="312" y="503" width="400" height="200"/>
  </clipPath>
  <circle cx="512" cy="497" r="188" fill="url(#ballBottom)" clip-path="url(#bottomHalf)"/>

  <!-- マスターボール「M」マーク -->
  <text x="512" y="468" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="130" fill="white" stroke="white" stroke-width="1" letter-spacing="-5">M</text>

  <!-- マスターボールのピンク丸（左右） -->
  <circle cx="415" cy="410" r="16" fill="#FF69B4" fill-opacity="0.9"/>
  <circle cx="609" cy="410" r="16" fill="#FF69B4" fill-opacity="0.9"/>
  <circle cx="415" cy="410" r="9" fill="#FFB6D9" fill-opacity="0.6"/>
  <circle cx="609" cy="410" r="9" fill="#FFB6D9" fill-opacity="0.6"/>

  <!-- 中央ライン -->
  <rect x="322" y="489" width="380" height="16" rx="8" fill="#1A1A1A"/>

  <!-- 中央ボタン -->
  <circle cx="512" cy="497" r="42" fill="#1A1A1A"/>
  <circle cx="512" cy="497" r="33" fill="#F0F0F0" filter="url(#glow)"/>
  <circle cx="512" cy="497" r="22" fill="#E8E8E8"/>
  <circle cx="505" cy="490" r="9" fill="white" fill-opacity="0.6"/>

  <!-- ボール上のハイライト -->
  <ellipse cx="462" cy="390" rx="55" ry="28" fill="white" fill-opacity="0.15" transform="rotate(-20 462 390)"/>

  <!-- 王冠（小さく） -->
  <g filter="url(#shadow)" transform="translate(512, 310) scale(0.55) translate(-512, -310)">
    <!-- 王冠ベース -->
    <path d="M400 310 L420 220 L466 280 L512 180 L558 280 L604 220 L624 310 Z" fill="url(#crownGrad)"/>
    <!-- 王冠の下部バンド -->
    <rect x="400" y="300" width="224" height="28" rx="4" fill="url(#goldGrad)"/>
    <rect x="408" y="310" width="208" height="4" rx="2" fill="#8B6914" fill-opacity="0.5"/>
    <!-- 王冠の頂点の丸 -->
    <circle cx="420" cy="218" r="12" fill="#FFD700" filter="url(#glow)"/>
    <circle cx="512" cy="178" r="14" fill="#FFD700" filter="url(#glow)"/>
    <circle cx="604" cy="218" r="12" fill="#FFD700" filter="url(#glow)"/>
    <!-- 王冠の宝石 -->
    <circle cx="440" cy="304" r="8" fill="#9B59B6"/>
    <circle cx="512" cy="304" r="10" fill="#9B59B6"/>
    <circle cx="584" cy="304" r="8" fill="#9B59B6"/>
  </g>

  <!-- 星の装飾 -->
  <g fill="#FFD700" fill-opacity="0.8" filter="url(#glow)">
    <circle cx="400" cy="270" r="4"/>
    <circle cx="624" cy="270" r="4"/>
    <circle cx="375" cy="295" r="3"/>
    <circle cx="649" cy="295" r="3"/>
  </g>

  <!-- 紙吹雪 -->
  <!-- 金の紙片 -->
  <rect x="255" y="200" width="14" height="12" rx="2" fill="#D4A017" fill-opacity="0.85" transform="rotate(35 255 200)"/>
  <rect x="715" y="260" width="12" height="10" rx="2" fill="#FFD700" fill-opacity="0.8" transform="rotate(-25 715 260)"/>
  <rect x="695" y="530" width="14" height="12" rx="2" fill="#FFE88A" fill-opacity="0.8" transform="rotate(-40 695 530)"/>
  <rect x="545" y="230" width="13" height="11" rx="2" fill="#FFD700" fill-opacity="0.85" transform="rotate(-50 545 230)"/>
  <rect x="375" y="345" width="12" height="11" rx="2" fill="#D4A017" fill-opacity="0.7" transform="rotate(-18 375 345)"/>
  <rect x="225" y="305" width="10" height="9" rx="2" fill="#FFD700" fill-opacity="0.75" transform="rotate(-65 225 305)"/>
  <rect x="675" y="445" width="12" height="10" rx="2" fill="#C8961E" fill-opacity="0.6" transform="rotate(30 675 445)"/>
  <rect x="310" y="260" width="13" height="11" rx="2" fill="#FFD700" fill-opacity="0.75" transform="rotate(8 310 260)"/>
  <rect x="780" y="350" width="12" height="11" rx="2" fill="#FFD700" fill-opacity="0.65" transform="rotate(-48 780 350)"/>
  <rect x="425" y="695" width="12" height="10" rx="2" fill="#C8961E" fill-opacity="0.7" transform="rotate(25 425 695)"/>
  <rect x="650" y="700" width="11" height="10" rx="2" fill="#FFE88A" fill-opacity="0.65" transform="rotate(-33 650 700)"/>
  <!-- ボール上の金 -->
  <rect x="470" y="420" width="12" height="10" rx="2" fill="#FFD700" fill-opacity="0.7" transform="rotate(22 470 420)"/>
  <rect x="560" y="540" width="11" height="9" rx="2" fill="#D4A017" fill-opacity="0.6" transform="rotate(-55 560 540)"/>
  <rect x="490" y="580" width="13" height="11" rx="2" fill="#FFE88A" fill-opacity="0.65" transform="rotate(38 490 580)"/>
  <rect x="440" y="350" width="10" height="9" rx="2" fill="#C8961E" fill-opacity="0.6" transform="rotate(-30 440 350)"/>
  <rect x="590" y="400" width="11" height="10" rx="2" fill="#FFD700" fill-opacity="0.55" transform="rotate(65 590 400)"/>

  <!-- 紫の紙片 -->
  <rect x="745" y="365" width="13" height="11" rx="2" fill="#9B59B6" fill-opacity="0.8" transform="rotate(50 745 365)"/>
  <rect x="290" y="335" width="12" height="10" rx="2" fill="#BB7FD6" fill-opacity="0.75" transform="rotate(-30 290 335)"/>
  <rect x="465" y="305" width="11" height="9" rx="2" fill="#7D3C98" fill-opacity="0.65" transform="rotate(-42 465 305)"/>
  <rect x="735" y="495" width="11" height="10" rx="2" fill="#7D3C98" fill-opacity="0.65" transform="rotate(38 735 495)"/>
  <rect x="245" y="645" width="12" height="10" rx="2" fill="#9B59B6" fill-opacity="0.65" transform="rotate(-22 245 645)"/>
  <rect x="600" y="250" width="10" height="9" rx="2" fill="#9B59B6" fill-opacity="0.6" transform="rotate(-52 600 250)"/>
  <rect x="585" y="675" width="13" height="11" rx="2" fill="#BB7FD6" fill-opacity="0.7" transform="rotate(15 585 675)"/>
  <!-- ボール上の紫 -->
  <rect x="530" y="460" width="11" height="9" rx="2" fill="#9B59B6" fill-opacity="0.55" transform="rotate(70 530 460)"/>
  <rect x="450" y="520" width="10" height="9" rx="2" fill="#BB7FD6" fill-opacity="0.5" transform="rotate(-20 450 520)"/>

  <!-- ピンクの紙片 -->
  <rect x="755" y="455" width="11" height="10" rx="2" fill="#FF69B4" fill-opacity="0.7" transform="rotate(20 755 455)"/>
  <rect x="345" y="445" width="11" height="10" rx="2" fill="#FFB6D9" fill-opacity="0.6" transform="rotate(48 345 445)"/>
  <rect x="685" y="325" width="12" height="10" rx="2" fill="#FF69B4" fill-opacity="0.7" transform="rotate(-12 685 325)"/>
  <rect x="230" y="545" width="12" height="10" rx="2" fill="#FF69B4" fill-opacity="0.75" transform="rotate(-55 230 545)"/>
  <rect x="565" y="295" width="10" height="9" rx="2" fill="#FF69B4" fill-opacity="0.65" transform="rotate(-35 565 295)"/>
  <!-- ボール上のピンク -->
  <rect x="480" y="470" width="10" height="9" rx="2" fill="#FF69B4" fill-opacity="0.5" transform="rotate(42 480 470)"/>
  <rect x="555" y="510" width="11" height="9" rx="2" fill="#FFB6D9" fill-opacity="0.5" transform="rotate(-60 555 510)"/>

  <!-- 白の紙片 -->
  <rect x="655" y="220" width="11" height="10" rx="2" fill="white" fill-opacity="0.65" transform="rotate(-15 655 220)"/>
  <rect x="340" y="485" width="10" height="9" rx="2" fill="white" fill-opacity="0.55" transform="rotate(45 340 485)"/>
  <rect x="775" y="545" width="11" height="10" rx="2" fill="white" fill-opacity="0.5" transform="rotate(18 775 545)"/>
  <rect x="385" y="245" width="9" height="8" rx="2" fill="white" fill-opacity="0.6" transform="rotate(-38 385 245)"/>
  <rect x="635" y="575" width="11" height="10" rx="2" fill="white" fill-opacity="0.55" transform="rotate(-48 635 575)"/>
  <!-- ボール上の白 -->
  <rect x="520" y="380" width="10" height="8" rx="2" fill="white" fill-opacity="0.45" transform="rotate(15 520 380)"/>
  <rect x="460" y="560" width="9" height="8" rx="2" fill="white" fill-opacity="0.4" transform="rotate(-50 460 560)"/>

</svg>
